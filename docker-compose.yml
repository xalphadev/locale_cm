# Locale — shared DATA plane (Postgres+PostGIS + MinIO). Base for BOTH dev and prod, so localhost
# mirrors the server: same images, same bucket, same key layout. The two layers on top:
#   • docker-compose.override.yml  (auto-loaded on plain `docker compose up`) — DEV: trust auth +
#       auto-applies migrations on first boot. Apps run on the host (npm run dev) for fast HMR.
#   • docker-compose.prod.yml      (explicit -f)                              — PROD: adds Caddy +
#       the web/consumer/api containers; db uses a password (no trust); migrations applied by deploy.sh.
#
# Ports are bound to 127.0.0.1 only (never 0.0.0.0): safe to keep on the server (the host can seed +
# psql), and the public path to MinIO in prod is Caddy → minio over the internal network, not this port.
#
#   dev:   docker compose up -d
#   prod:  docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: locale-db
    environment:
      POSTGRES_DB: locale
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}   # required in prod (.env.prod); dev override uses trust
      TZ: Asia/Bangkok                            # local-midnight resets for daily check-in caps / first-of-day jackpot
      PGTZ: Asia/Bangkok
    ports:
      - "127.0.0.1:54400:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d locale"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: locale-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      TZ: Asia/Bangkok
    ports:
      - "127.0.0.1:9000:9000"   # S3 API  (host-only: seed uploads + prod path is Caddy→internal)
      - "127.0.0.1:9001:9001"   # console
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # one-shot: create the public-read `media` bucket once MinIO is reachable, then exit
  createbuckets:
    image: minio/mc:latest
    container_name: locale-createbuckets
    depends_on:
      - minio
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-media}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb -p "local/$${S3_BUCKET}"
        mc anonymous set download "local/$${S3_BUCKET}"
        echo "bucket $${S3_BUCKET} ready (public download)"

volumes:
  pgdata:
  miniodata:
